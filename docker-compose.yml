services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Password123
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Password123' -Q 'SELECT 1' -No -C || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./MVP
      dockerfile: Dockerfile
    container_name: mvp-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=MVP;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=True
    networks:
      - app-network
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build:
      context: ./MVP-app
      dockerfile: Dockerfile
    container_name: mvp-frontend
    ports:
      - "4000:80"
    environment:
      - API_URL=http://mvp-api:8080
            - NG_ALLOWED_HOSTS=localhost,mvp-frontend
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge

volumes:
  sqlserver-data: