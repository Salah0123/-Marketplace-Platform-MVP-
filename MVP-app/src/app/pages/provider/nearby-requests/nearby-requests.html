<div class="container my-4">

    <h3 class="fw-bold mb-4">Nearby Requests</h3>
  
    @if (loading()) {
      <div class="text-center">
        <div class="spinner-border"></div>
        <p class="mt-2">Getting your location...</p>
      </div>
    }
  
    @if (error()) {
      <div class="alert alert-danger">
        {{ error() }}
      </div>
    }
  
    <div class="row g-3">
  
      @for (req of requests(); track req.id) {
        <div class="col-md-6 col-lg-4">
  
          <div class="card shadow-sm border-0 h-100">
  
            <div class="card-body d-flex flex-column">
  
              <!-- Title + Status -->
              <div class="d-flex justify-content-between mb-2">
  
                <h5 class="fw-bold mb-0">
                  {{ req.title }}
                </h5>
  
                <span class="badge"
                      [ngClass]="getStatusClass(req.status)">
                  {{ req.status }}
                </span>
  
              </div>
  
              <!-- Description -->
              <p class="text-muted small mb-3">
                {{ req.description }}
              </p>
  
              <!-- Distance -->
              <div class="small mb-2">
                📏 {{ req.distance | number:'1.1-1' }} km away
              </div>
  
              <!-- Provider -->
              <div class="small mb-3">
                <strong>Provider:</strong>
                {{ req.provider || 'Not assigned yet' }}
              </div>
  
              <!-- Accept Button -->
              <button
                class="btn btn-primary btn-sm w-100 mt-auto"
                (click)="acceptRequest(req.id)"
                [disabled]="acceptingId() === req.id || req.status !== 'Pending'">
  
                @if (acceptingId() === req.id) {
                  <span class="spinner-border spinner-border-sm"></span>
                } @else {
                  <span>
                    {{ req.status === 'Pending' ? 'Accept Request' : 'Not Available' }}
                  </span>
                }
  
              </button>
  
            </div>
  
          </div>
  
        </div>
      }
  
    </div>
  
  </div>
